<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#22c55e" />
    </linearGradient>
    <filter id="vGlow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#2563eb" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <rect x="50" y="50" width="400" height="300" rx="30" fill="white" opacity="0.6" stroke="url(#vGrad)" stroke-width="2" filter="url(#vGlow)"/>
  
  <!-- Abstract Venture Icon -->
  <g transform="translate(250, 180)">
     <circle r="60" fill="none" stroke="url(#vGrad)" stroke-width="4" stroke-dasharray="10 10"/>
     <path d="M-30,-10 L0,20 L40,-20" stroke="url(#vGrad)" stroke-width="8" stroke-linecap="round" fill="none"/>
     <circle cx="-30" cy="-10" r="5" fill="#2563eb"/>
     <circle cx="40" cy="-20" r="5" fill="#22c55e"/>
  </g>
  
  <text x="250" y="320" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#111827">Review Monkey</text>
  <text x="250" y="345" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#6b7280">Product Architecture</text>
</svg>
