<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Deep vibrant gradient using the new color palette -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    
    <!-- Crisp metallic gradient for the text -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>
    
    <!-- Shadow filter for depth -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Modern super-ellipse style background -->
  <rect x="8" y="8" width="112" height="112" rx="36" fill="url(#bgGrad)" filter="url(#glow)" />
  
  <!-- Subtle inner glass glare / rim highlight -->
  <rect x="10" y="10" width="108" height="108" rx="34" fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3" />

  <!-- Data Analyst subtle visual cue (abstract chart line) -->
  <path d="M 32 96 Q 58 48 96 76" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-opacity="0.15" />
  <circle cx="96" cy="76" r="6" fill="#ffffff" fill-opacity="0.25" />
  
  <!-- Bold PR Monogram -->
  <text x="64" y="85"
        text-anchor="middle"
        font-size="54"
        font-weight="800"
        fill="url(#textGrad)"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        letter-spacing="-2">
    PR
  </text>
</svg>