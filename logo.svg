<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 250" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Brand Gradient -->
<linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#2563eb"/>
  <stop offset="100%" stop-color="#22c55e"/>
</linearGradient>

<!-- Soft Glow -->
<filter id="softGlow">
  <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#2563eb" flood-opacity="0.4"/>
</filter>

</defs>

<!-- ================= ICON ================= -->

<!-- Outer Ring -->
<circle cx="125"
        cy="125"
        r="75"
        fill="none"
        stroke="url(#brandGrad)"
        stroke-width="6"
        stroke-dasharray="12 14"
        filter="url(#softGlow)"/>

<!-- Data Nodes -->
<circle cx="125" cy="50" r="6" fill="#2563eb"/>
<circle cx="200" cy="125" r="6" fill="#22c55e"/>
<circle cx="125" cy="200" r="6" fill="#2563eb"/>
<circle cx="50" cy="125" r="6" fill="#22c55e"/>

<!-- Subtle Inner Circle -->
<circle cx="125"
        cy="125"
        r="35"
        fill="none"
        stroke="url(#brandGrad)"
        stroke-width="2"
        opacity=".5"/>

<!-- PR Monogram -->
<text x="125"
      y="138"
      text-anchor="middle"
      font-size="36"
      font-weight="700"
      fill="#111827"
      font-family="Inter, Arial, sans-serif">
  PR
</text>

<!-- ================= WORDMARK ================= -->

<!-- Name -->
<text x="250"
      y="110"
      font-size="40"
      font-weight="700"
      fill="#111827"
      font-family="Inter, Arial, sans-serif">
  Priyanshu Raj
</text>

<!-- Role -->
<text x="250"
      y="145"
      font-size="20"
      fill="#374151"
      font-family="Inter, Arial, sans-serif">
  Data Engineer
</text>

<!-- Accent Line -->
<rect x="250"
      y="160"
      width="260"
      height="3"
      fill="url(#brandGrad)"
      rx="2"/>

</svg>