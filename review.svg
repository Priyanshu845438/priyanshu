<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="brandGrad" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#2563eb"/>
  <stop offset="100%" stop-color="#22c55e"/>
</linearGradient>

<filter id="softShadow">
  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.15"/>
</filter>

<style>

@keyframes rotateRing {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

@keyframes floatCard {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-8px); }
}

@keyframes growBar {
  from { height:0; }
  to { height:140px; }
}

@keyframes drawLine {
  from { stroke-dashoffset:400; }
  to { stroke-dashoffset:0; }
}

@keyframes starPop {
  0% { opacity:0; transform:scale(.5); }
  100% { opacity:1; transform:scale(1); }
}

@keyframes monkeyBounce {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

@keyframes blink {
  0%,95%,100% { transform: scaleY(1); }
  97% { transform: scaleY(0.1); }
}

#ring {
  animation: rotateRing 25s linear infinite;
  transform-origin: 300px 300px;
}

.card {
  animation: floatCard 6s ease-in-out infinite;
}

.bar {
  animation: growBar 2s ease forwards;
  transform-origin: bottom;
}

#line {
  stroke-dasharray:400;
  stroke-dashoffset:400;
  animation: drawLine 2.5s ease forwards;
}

.star {
  opacity:0;
  animation: starPop .6s ease forwards;
}

.star:nth-child(1){animation-delay:.6s;}
.star:nth-child(2){animation-delay:.8s;}
.star:nth-child(3){animation-delay:1s;}
.star:nth-child(4){animation-delay:1.2s;}
.star:nth-child(5){animation-delay:1.4s;}

#monkey {
  animation: monkeyBounce 4s ease-in-out infinite;
  transform-origin:300px 120px;
}

.eye {
  animation: blink 4s infinite;
  transform-origin:center;
}

</style>

</defs>

<!-- Automation Ring -->
<circle id="ring"
        cx="300"
        cy="300"
        r="240"
        fill="none"
        stroke="url(#brandGrad)"
        stroke-width="3"
        stroke-dasharray="10 14"
        opacity=".4"/>

<!-- Glass Card -->
<g class="card" filter="url(#softShadow)">

  <rect x="130" y="170" width="340" height="230" rx="24"
        fill="white"
        stroke="url(#brandGrad)"
        stroke-width="3"/>

  <!-- Rating -->
  <text x="300"
        y="215"
        text-anchor="middle"
        font-size="36"
        font-weight="700"
        fill="#111827"
        font-family="Inter, Arial">
    4.5
  </text>

  <!-- Stars -->
  <g transform="translate(205,230)" fill="#facc15">

    <polygon class="star" points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"/>
    <polygon class="star" transform="translate(30,0)" points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"/>
    <polygon class="star" transform="translate(60,0)" points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"/>
    <polygon class="star" transform="translate(90,0)" points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"/>

    <!-- Half Star -->
    <polygon class="star"
      transform="translate(120,0)"
      points="10,0 13,7 20,7 14,12 16,20 10,15 4,20 6,12 0,7 7,7"
      clip-path="url(#half)"/>

    <clipPath id="half">
      <rect x="0" y="0" width="10" height="20"/>
    </clipPath>

  </g>

  <!-- Growth Line -->
  <polyline id="line"
            points="180,330 230,300 280,310 330,270 380,240"
            fill="none"
            stroke="url(#brandGrad)"
            stroke-width="4"/>

  <!-- Bars -->
  <g transform="translate(210,350)">
    <rect class="bar" x="0" width="18" height="90" fill="#2563eb"/>
    <rect class="bar" x="40" width="18" height="70" fill="#3b82f6"/>
    <rect class="bar" x="80" width="18" height="110" fill="#22c55e"/>
    <rect class="bar" x="120" width="18" height="140" fill="#16a34a"/>
  </g>

</g>

<!-- Monkey -->
<g id="monkey">

  <circle cx="300" cy="120" r="38" fill="#8b5e3c"/>
  <circle cx="270" cy="95" r="15" fill="#a9744f"/>
  <circle cx="330" cy="95" r="15" fill="#a9744f"/>

  <circle class="eye" cx="285" cy="120" r="5" fill="white"/>
  <circle class="eye" cx="315" cy="120" r="5" fill="white"/>
  <circle cx="285" cy="120" r="2" fill="black"/>
  <circle cx="315" cy="120" r="2" fill="black"/>

  <path d="M 280 135 Q 300 155 320 135"
        stroke="white"
        stroke-width="3"
        fill="none"/>

</g>

<!-- Bottom Text -->
<text x="300"
      y="560"
      text-anchor="middle"
      font-size="28"
      font-weight="600"
      fill="#111827"
      font-family="Inter, Arial">
  ReviewMonkey Growth Engine
</text>

</svg>